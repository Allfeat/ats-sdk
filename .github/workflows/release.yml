name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      ats-sdk--release_created: ${{ steps.release.outputs['ats-sdk--release_created'] }}
      pallet-ats--release_created: ${{ steps.release.outputs['pallet-ats--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish-ats-sdk:
    name: Publish ats-sdk to crates.io
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs['ats-sdk--release_created'] == 'true'
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p ats-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pallet-ats:
    name: Publish pallet-ats to crates.io
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs['pallet-ats--release_created'] == 'true'
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p pallet-ats
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
