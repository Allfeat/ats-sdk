name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      ats-sdk--release_created: ${{ steps.release.outputs['ats-sdk--release_created'] }}
      ats-proof-tools--release_created: ${{ steps.release.outputs['ats-proof-tools--release_created'] }}
      ats-proof-tools--tag_name: ${{ steps.release.outputs['ats-proof-tools--tag_name'] }}
      pallet-ats--release_created: ${{ steps.release.outputs['pallet-ats--release_created'] }}
      pallet-ats-primitives--release_created: ${{ steps.release.outputs['pallet-ats-primitives--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish-ats-sdk:
    name: Publish ats-sdk to crates.io
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs['ats-sdk--release_created'] == 'true'
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p ats-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pallet-ats-primitives:
    name: Publish pallet-ats-primitives to crates.io
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs['pallet-ats-primitives--release_created'] == 'true'
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p pallet-ats-primitives
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pallet-ats:
    name: Publish pallet-ats to crates.io
    runs-on: ubuntu-latest
    needs: [release-please, publish-pallet-ats-primitives]
    if: always() && needs.release-please.outputs['pallet-ats--release_created'] == 'true' && (needs.publish-pallet-ats-primitives.result == 'success' || needs.publish-pallet-ats-primitives.result == 'skipped')
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p pallet-ats
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  deploy-proof-tools:
    name: Deploy ATS Proof Tools to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs['ats-proof-tools--release_created'] == 'true'
    defaults:
      run:
        working-directory: ats-proof-tools
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ats-proof-tools
      - name: Install trunk & binaryen
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar xzf - -C /usr/local/bin
          sudo apt-get update && sudo apt-get install -y --no-install-recommends binaryen
      - name: Build
        run: trunk build --release
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ats-proof-tools/dist --project-name=ats-proof-tools
